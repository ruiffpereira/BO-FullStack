name: CI

# Gate de testes (unit + e2e) + deploy (Coolify) + smoke read-only pós-deploy.
# Rollout faseado por variáveis de repositório (Settings → Variables):
#   - unit corre sempre (não precisa de config).
#   - e2e só corre quando E2E_ENABLED == 'true' (precisa do secret GH_PAT p/ clonar a API).
#   - deploy/smoke só correm quando DEPLOY_ENABLED == 'true'.
# Ver CI-SETUP.md na raiz do workspace.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-bo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (vitest + RTL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile
      - name: Gerar cliente da API (Kubb, offline a partir do spec.json)
        run: pnpm kubb
        env:
          KUBB_OFFLINE: '1'
      - name: Correr unit tests
        run: pnpm test:unit

  e2e:
    name: e2e (Playwright — Backoffice + API)
    # Cross-repo: precisa do secret GH_PAT para clonar o repo privado da API.
    # Ativar com a variável E2E_ENABLED='true' depois de criar o PAT.
    if: vars.E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backoffice
        uses: actions/checkout@v4
        with:
          path: Backoffice

      - name: Checkout API (repo irmão)
        uses: actions/checkout@v4
        with:
          repository: ruiffpereira/API-FullStack
          ref: main
          path: API-FullStack
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            Backoffice/pnpm-lock.yaml
            API-FullStack/pnpm-lock.yaml

      - name: Instalar dependências (API)
        working-directory: API-FullStack
        run: pnpm install --frozen-lockfile
      - name: Instalar dependências (Backoffice)
        working-directory: Backoffice
        run: pnpm install --frozen-lockfile

      - name: Gerar cliente da API (Kubb, offline a partir do spec.json)
        working-directory: Backoffice
        run: pnpm kubb
        env:
          KUBB_OFFLINE: '1'

      - name: Criar Backoffice/.env.test (gitignored — valores de teste)
        working-directory: Backoffice
        run: |
          cat > .env.test <<'EOF'
          VITE_API_BASE_URL=http://localhost:3002/api
          TEST_USER=admin@e2e
          TEST_PASSWORD=E2ePass123!
          EOF

      - name: Arrancar MySQL de teste (api_test + api_e2e via init)
        working-directory: API-FullStack
        run: docker compose -f docker-compose.test.yml --env-file .env.test up -d --wait --wait-timeout 120

      - name: Instalar browsers Playwright
        working-directory: Backoffice
        run: pnpm exec playwright install --with-deps chromium

      - name: Correr e2e (auto-arranca API :3002 + Vite :5273 + seed)
        working-directory: Backoffice
        run: pnpm test:e2e

      - name: Upload do relatório Playwright (em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Backoffice/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy (Coolify) — só se unit + e2e passarem
    needs: [unit, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy no Coolify
        env:
          HOOK: ${{ secrets.COOLIFY_DEPLOY_HOOK_BO }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          # Coolify: normalmente GET ao endpoint de deploy com Bearer (API v1).
          # Se o teu hook for um URL simples sem token, deixa COOLIFY_TOKEN vazio.
          curl --fail --silent --show-error "$HOOK" ${TOKEN:+-H "Authorization: Bearer $TOKEN"}

  smoke:
    name: Smoke — verifica que ESTE commit ficou live (Backoffice)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Poll /version.json até reportar o commit deste deploy
        run: |
          URL="${{ vars.BO_URL }}"; URL="${URL%/}"
          WANT="${{ github.sha }}"
          if [ -z "$URL" ]; then echo "vars.BO_URL não definido"; exit 1; fi
          sleep 30
          alive=""; live=""
          for i in $(seq 1 40); do
            code=$(curl -s -o /tmp/root -w '%{http_code}' "$URL/?_=$i" || echo 000)
            live=$(curl -fsS "$URL/version.json?_=$i" 2>/dev/null | grep -o '"commit":"[^"]*"' | cut -d'"' -f4)
            echo "[$i] http=$code  commit_live=${live:-<none>}  quero=$WANT"
            { [ "$code" = "200" ] && grep -q 'id="root"' /tmp/root; } && alive=1
            if [ -n "$live" ] && [ "$live" != "unknown" ] && [ "$live" = "$WANT" ]; then
              echo "✔ Backoffice a servir ESTE commit."; exit 0
            fi
            sleep 8
          done
          # Timeout — distinguir falha real de carimbo indisponível:
          if [ -n "$live" ] && [ "$live" != "unknown" ]; then
            echo "✗ Versão nova NÃO ficou live: /version.json reporta $live, esperado $WANT."; exit 1
          elif [ -n "$alive" ]; then
            echo "⚠ /version.json indisponível/sem commit — smoke degradou para liveness."
            echo "   (revê scripts/write-version.mjs / o build). A passar para não bloquear."; exit 0
          else
            echo "✗ O backoffice não respondeu após o deploy."; exit 1
          fi
