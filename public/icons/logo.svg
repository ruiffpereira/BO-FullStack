<svg width="312" height="200" viewBox="0 0 312 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardLogo" x1="156" y1="0" x2="156" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8ebf0"/>
      <stop offset="1" stop-color="#d6dce4"/>
    </linearGradient>
    <clipPath id="cardClipLogo">
      <rect x="0" y="0" width="312" height="200" rx="28"/>
    </clipPath>
  </defs>

  <!-- Cartão (sem fundo/quadrado exterior) -->
  <g clip-path="url(#cardClipLogo)">
    <rect x="0" y="0" width="312" height="200" fill="url(#cardLogo)"/>
    <rect x="0" y="0" width="96" height="200" fill="#c6cdd7"/>
  </g>

  <!-- Pills da barra lateral -->
  <rect x="24" y="30" width="48" height="16" rx="8" fill="#ef3a40"/>
  <rect x="24" y="56" width="48" height="16" rx="8" fill="#9aa4b0"/>
  <rect x="24" y="82" width="48" height="16" rx="8" fill="#9aa4b0"/>

  <!-- RV -->
  <text x="132" y="120" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="800" fill="#16233c">R</text>
  <text x="212" y="120" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="800" fill="#ef3a40">V</text>

  <!-- Pills inferiores -->
  <rect x="132" y="144" width="128" height="18" rx="9" fill="#9aa4b0"/>
  <rect x="132" y="172" width="88" height="18" rx="9" fill="#aeb6c1"/>
</svg>
